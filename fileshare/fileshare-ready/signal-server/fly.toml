# IMPORTANT: Change "fileshare-signal" to your own unique name
# Example: app = "editroy-signal"
app            = "fileshare-signal"
primary_region = "sin"

[build]

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    grace_period = "5s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "3s"
    type         = "http"
