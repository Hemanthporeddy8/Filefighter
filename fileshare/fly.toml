# ── Edit app name below (must be globally unique) ──
app            = "my-fileshare"
primary_region = "sin"

[build]

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    grace_period = "5s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "3s"
    type         = "http"
