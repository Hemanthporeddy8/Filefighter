.mg{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.3rem}

.bok{background:var(--okd);border:1px solid rgba(52,211,153,.2);color:var(--ok)}
.binf{background:var(--ad);border:1px solid rgba(34,211,238,.2);color:var(--a)}
.bwn{background:var(--wnd);border:1px solid rgba(251,191,36,.2);color:var(--wn)}
.mtg{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .7rem;border-radius:99px;font-size:.7rem}

.div{height:1px;background:var(--b);margin:1rem 0}

.slb{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--m2);margin-bottom:.45rem}

<div class="wrap">

<script>
let lastWidth = window.innerWidth;
function sendHeight() {
  setTimeout(() => {
    const box = document.querySelector('.box');
    if (!box) return;
    const height = box.offsetHeight;
    window.parent.postMessage({ type: 'resize-iframe', height: height }, '*');
  }, 40);
}
if (window.self !== window.top) {
  document.documentElement.classList.add('embedded');
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', () => {
    if (window.innerWidth !== lastWidth) {
      lastWidth = window.innerWidth;
      sendHeight();
    }
  });
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'request-height') sendHeight();
  });
  const observer = new MutationObserver(sendHeight);
  window.addEventListener('DOMContentLoaded', () => {
    sendHeight();
    observer.observe(document.body, { attributes: true, childList: true, subtree: true });
  });
}
window.acceptedBatches = {};
window.sendQueue = [];
window.sendQueueIndex = 0;

const safeStorage = {
  get(key) {
    try { return localStorage.getItem(key); } catch (e) { console.warn('localStorage get failed', e); return window[key] || ''; }
  },
  set(key, val) {
    try { localStorage.setItem(key, val); } catch (e) { console.warn('localStorage set failed', e); window[key] = val; }
  }
};

const isLocal = (
  location.hostname === 'localhost' || 
  location.hostname === '127.0.0.1' || 
  location.hostname.startsWith('192.168.') || 
  location.hostname.startsWith('10.') || 
  location.hostname.startsWith('172.')
);

const SIG = 'wss://fileshare-qhgn.onrender.com/ws';

const API_BASE = 'https://fileshare-qhgn.onrender.com';

let logTimer = null, logSeconds = 0;
function logD(msg) {
  console.log(msg);
  const dbg = document.getElementById('dbg');
  if (!dbg) return;
  const time = new Date().toLocaleTimeString([], { hour12: false, second: '2-digit', minute: '2-digit' });
  dbg.innerHTML += `<div>[${time}] ${msg}</div>`;
  dbg.scrollTop = dbg.scrollHeight;
}
function startTimer() {
  stopTimer();
  logSeconds = 0;
  logTimer = setInterval(() => {
    logSeconds++;
    const el = document.getElementById('timer-val');
    if (el) el.textContent = `${logSeconds}s`;
  }, 1000);
}
function stopTimer() {
  if (logTimer) {
    clearInterval(logTimer);
    logTimer = null;
  }
}

const ICE = { iceServers:[
  {urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302','stun:stun2.l.google.com:19302']},
  {urls:['turn:openrelay.metered.ca:80','turn:openrelay.metered.ca:443','turn:openrelay.metered.ca:443?transport=tcp'],username:'openrelayproject',credential:'openrelayproject'}
]};

const CHUNK   = 256*1024;
const MAXBUF  = 8*1024*1024;
const P2P_TO  = 60000;
const CHARS   = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';

const $    = id => document.getElementById(id);
const esc  = s => (s || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
const root = () => $('root');
const fmtB = b => { if(b===undefined||b===null||isNaN(b))return'—'; if(b===0)return'0 B'; if(b<1024)return b+' B'; if(b<1048576)return(b/1024).toFixed(1)+' KB'; if(b<1073741824)return(b/1048576).toFixed(1)+' MB'; return(b/1073741824).toFixed(2)+' GB'; };
const fmtS = s => { if(s<1024)return s.toFixed(0)+' B/s'; if(s<1048576)return(s/1024).toFixed(0)+' KB/s'; return(s/1048576).toFixed(1)+' MB/s'; };
const fmtE = s => s<60?s+'s left':s<3600?Math.round(s/60)+'m left':(s/3600).toFixed(1)+'h left';
const genC  = () => Array.from({length:6},()=>CHARS[Math.floor(Math.random()*CHARS.length)]).join('');
const mIco  = t => { if(!t)return'📁'; if(t.startsWith('image'))return'🖼️'; if(t.startsWith('video'))return'🎬'; if(t.startsWith('audio'))return'🎵'; if(t.includes('pdf'))return'📄'; if(t.includes('zip')||t.includes('tar')||t.includes('rar')||t.includes('7z'))return'📦'; if(t.startsWith('text'))return'📝'; return'📁'; };
function cpText(txt,btn){ navigator.clipboard.writeText(txt).then(()=>{ const o=btn.textContent; btn.textContent='✓'; btn.style.color='var(--ok)'; setTimeout(()=>{btn.textContent=o;btn.style.color='';},2000); }).catch(()=>{}); }
function setSt(txt,cls='dy'){ const sl=$('stl'),tx=$('stx'); if(!sl||!tx)return; sl.querySelector('.dot').className='dot '+cls+' pu'; tx.textContent=txt; }
function setProg(r,lbl,spd,eta){ const pw=$('pw'); if(!pw)return; pw.style.display='block'; $('pf').style.width=(Math.min(r,1)*100).toFixed(1)+'%'; $('pct').textContent=Math.round(r*100)+'%'; if($('pl')&&lbl)$('pl').textContent=lbl; if($('spd')&&spd!==undefined)$('spd').textContent=spd?fmtS(spd):''; if($('eta')&&eta!==undefined)$('eta').textContent=eta?fmtE(eta):''; }
function saveBlob(blob,name){ const url=URL.createObjectURL(blob); const a=Object.assign(document.createElement('a'),{href:url,download:name}); document.body.appendChild(a);a.click();document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),60000); }

function showHome(forceHome=false){
  stopTimer();
  updateHeaderAuth();
  if(forceHome){
    try{history.replaceState({}, '', location.pathname);}catch(e){}
  }
  const p=new URLSearchParams(location.search);
  const qc=p.get('code')?.toUpperCase().slice(0,6);
  const ri=p.get('relay');
  const ib=p.get('inbox')?.toUpperCase().slice(0,6);
  if(!forceHome){
    if(ri) return startRelayRecv(ri);
    if(qc&&/^[A-Z0-9]{6}$/.test(qc)) return startRecv(qc);
    if(ib&&/^[A-Z0-9]{6}$/.test(ib)) return startInboxSender(ib);
  }
  
  const session = getActiveSessionType();
  let sessionModeName = '';
  if (session) {
    if (session.type === 'inbox') {
      const isPerm = !!localStorage.getItem('fs_auth_token');
      sessionModeName = isPerm ? 'Express Permanent Share Mode' : 'Create Inbox';
    } else if (session.type === 'inboxsender') {
      sessionModeName = 'Send to Inbox';
    } else if (session.type === '1to1sender') {
      sessionModeName = 'Send File';
    } else if (session.type === '1to1receiver') {
      sessionModeName = 'Receive File';
    }
  }
  const sessionBanner = session ? `
    <div onclick="resumeActiveSession()" style="background:var(--ad); border:1px solid var(--a); border-radius:var(--r); padding:0.75rem 1rem; margin-bottom:1.25rem; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:all 0.15s;" onmouseover="this.style.filter='brightness(1.15)'" onmouseout="this.style.filter=''">
      <div style="display:flex; align-items:center; gap:0.5rem;">
        <span class="dot dg pu" style="width:8px; height:8px;"></span>
        <span style="font-size:0.8rem; font-weight:500;">Active Connection: <strong>${session.code}</strong> (${sessionModeName})</span>
      </div>
      <span style="font-size:0.75rem; color:var(--a); font-weight:600;">Resume →</span>
    </div>
  ` : '';
  
  root().innerHTML=`
    <div class="card fade">
      ${sessionBanner}
      <div class="mg">
        <button class="mb" onclick="showSend()">
          <span class="btn-qmark" data-tooltip="Direct 1-to-1 P2P file sharing. Generates a temporary room code for a receiver to connect and download your files directly." onclick="event.stopPropagation()">?</span>
          <div class="ic">⬆️</div><div class="lb">Send File</div><div class="sb">Generate room code</div>
        </button>
        <button class="mb" onclick="showSendToInbox()">
          <span class="btn-qmark" data-tooltip="Drop files into a receiver's active Inbox. Enter their 6-character Inbox Code to stream files directly to their dashboard." onclick="event.stopPropagation()">?</span>
          <div class="ic">📤</div><div class="lb">Send to Inbox</div><div class="sb">Enter inbox code</div>
        </button>
        <button class="mb" onclick="showRecv()">
          <span class="btn-qmark" data-tooltip="Connect to a sender's room code. Enter the code they shared to establish a secure P2P stream and download their files." onclick="event.stopPropagation()">?</span>
          <div class="ic">⬇️</div><div class="lb">Receive File</div><div class="sb">Enter room code</div>
        </button>
        <button class="mb" onclick="showCreateInbox()">
          <span class="btn-qmark" data-tooltip="Host a file drop dashboard. Generates a QR code and link so multiple people can stream files directly to your device." onclick="event.stopPropagation()">?</span>
          <div class="ic">📥</div><div class="lb">Create Inbox</div><div class="sb">Get a temporary drop dashboard</div>
        </button>
        <button class="mb" onclick="showPrintShopAuth()" style="grid-column: span 2;">
          <span class="btn-qmark" data-tooltip="Claim a permanent room code for your sharing needs. Print the QR flyer for your wall so users can send files instantly." onclick="event.stopPropagation()">?</span>

function runSender(file,code){
  let pc=null,dc=null,ws=null,done=false,timer=null;
  startTimer();
  logD('Connecting to signaling server...');
  ws=new WebSocket(`${SIG}?code=${code}&role=sender`);
  ws.onopen=()=>{
    logD('Connected to signaling server.');
    logD('Waiting for receiver to join room...');
    setSt('Waiting — share the code or QR with the receiver','dy');
    pc=new RTCPeerConnection(ICE);
    dc=pc.createDataChannel('file',{ordered:true});
    dc.binaryType='arraybuffer';
    timer=setTimeout(()=>{ if(!done){ setSt('P2P connection timed out. Please check network compatibility (WiFi/Mobile Data).','dr'); logD('Error: Connection timed out.'); stopTimer(); } },P2P_TO);
    pc.onicecandidate=({candidate})=>{
      if(candidate&&ws.readyState===1) {
        logD('Gathered network route (ICE candidate)');
        ws.send(JSON.stringify({type:'ice',candidate}));
      }
    };
    pc.onconnectionstatechange=()=>{
      logD('Connection state changed: ' + pc.connectionState);
      if(['disconnected','failed','closed'].includes(pc.connectionState)&&!done) {
        setSt('Connection lost.','dr');
        stopTimer();
      }
    };
    dc.onopen=()=>{
      clearTimeout(timer);
      logD('Data channel opened! Sending metadata...');
      const item = (window.sendQueue && window.sendQueue[window.sendQueueIndex]) || { batchId: null, index: 0, count: 1 };
      dc.send(JSON.stringify({
        type: 'meta',
        name: file.name,
        size: file.size,
        mimeType: file.type||'application/octet-stream',
        nickname: safeStorage.get('fs_nickname')||null,
        batchId: item.batchId,
        batchIndex: item.index,
        batchCount: item.count
      }));
      setSt(`Receiver reviewing — waiting for accept (${item.index + 1}/${item.count})…`,'db');
    };
    dc.onmessage=e=>{
      if(typeof e.data!=='string')return;
      const m=JSON.parse(e.data);
      if(m.type==='accept'){
        logD('Receiver accepted file. Starting direct P2P stream...');
        const item = (window.sendQueue && window.sendQueue[window.sendQueueIndex]) || { index: 0, count: 1 };
        setSt(`Transferring file ${item.index + 1} of ${item.count} via P2P…`,'dg');
        sendChunks(dc,file,()=>{
          done=true;
          stopTimer();
          if (window.sendQueue && window.sendQueueIndex + 1 < window.sendQueue.length) {
            window.sendQueueIndex++;
            const nextItem = window.sendQueue[window.sendQueueIndex];
            sendPersistent1to1File(nextItem.file, nextItem.batchId, nextItem.index, nextItem.count, dc, pc, ws);
          } else {
            showSendDonePersistent1to1(file, code, dc, pc, ws);
          }
        });
      }
    };
    dc.onclose=()=>{
      logD('Data channel closed.');
      if(!done) { setSt('Channel closed.','dr'); stopTimer(); }
    };
    logD('Creating WebRTC connection offer...');
    pc.createOffer().then(o=>pc.setLocalDescription(o)).then(()=>{
      logD('Offer created. Sending to signaling server...');
      ws.send(JSON.stringify({type:'offer',sdp:pc.localDescription}));
    }).catch(e=>{
      setSt('Error: '+e.message,'dr');
      logD('Offer Error: ' + e.message);
      stopTimer();
    });
  };
  let pIce=[];
  ws.onmessage=async({data})=>{
    const m=JSON.parse(data);
    if(m.type==='answer'){
      logD('Receiver joined! Received handshake answer.');
      setSt('Receiver found — forming P2P…','dy');
      await pc.setRemoteDescription(m.sdp).catch(()=>{});
      logD('Applying network routes...');
      for(const c of pIce){try{await pc.addIceCandidate(c);}catch{}}
      pIce=[];
    }
    else if(m.type==='ice'){
      logD('Received peer network route (ICE)');
      if(pc?.remoteDescription){try{await pc.addIceCandidate(m.candidate);}catch{}}else pIce.push(m.candidate);
    }
    else if(m.type==='peer-left'&&!done) {
      logD('Receiver disconnected.');
      setSt('Receiver disconnected.','dr');
      stopTimer();
    }
  };
  ws.onerror=()=>{
    logD('Error: Cannot connect to signaling server.');
    setSt('Cannot connect to signal server.','dr');
    stopTimer();
  };
}

function sendChunks(dc,file,onDone){
  let off=0,lastT=Date.now(),lastB=0,spd=0;
  const tick=()=>{
    if(off>=file.size){ dc.send(JSON.stringify({type:'done'})); onDone(); return; }
    if(dc.bufferedAmount>MAXBUF){ dc.bufferedAmountLowThreshold=MAXBUF/2; dc.onbufferedamountlow=()=>{ dc.onbufferedamountlow=null; tick(); }; return; }
    file.slice(off,off+CHUNK).arrayBuffer().then(buf=>{
      dc.send(buf); off+=buf.byteLength;
      const now=Date.now(),dt=now-lastT;
      if(dt>=400){ spd=((off-lastB)/dt)*1000; lastB=off; lastT=now; }
      const eta=spd>0?Math.round((file.size-off)/spd):0;
      setProg(off/file.size,'Sending…',spd,eta); tick();
    });
  };
  tick();
}

function uploadRelay(file,_code){
  const xhr=new XMLHttpRequest();
  xhr.open('POST','/api/relay/upload');
  xhr.setRequestHeader('X-File-Name',encodeURIComponent(file.name));
  xhr.setRequestHeader('X-File-Type',file.type||'application/octet-stream');
  xhr.setRequestHeader('X-File-Size',String(file.size));
  xhr.setRequestHeader('Content-Type',file.type||'application/octet-stream');
  let lL=0,lT=Date.now();
  xhr.upload.onprogress=e=>{ if(e.lengthComputable){ const now=Date.now(),dt=now-lT; let s=0,eta=0; if(dt>300){s=((e.loaded-lL)/dt)*1000;lL=e.loaded;lT=now;} if(s>0)eta=Math.round((e.total-e.loaded)/s); setProg(e.loaded/e.total,'Uploading to relay…',s,eta); }};
  xhr.onload=()=>{ if(xhr.status===201){ const{id}=JSON.parse(xhr.responseText); showSendDone(file,'relay',id); } else setSt('Relay upload failed.','dr'); };
  xhr.onerror=()=>setSt('Network error.','dr');
  xhr.send(file);
}

function runReceiver(code){
  let pc=null,ws=null,dc=null,meta=null;
  const chunks=[];let rcvd=0,spd=0,lR=0,lT=0;
  let pIce=[],accepted=false;
  startTimer();
  logD('Connecting to signaling server...');
  ws=new WebSocket(`${SIG}?code=${code}&role=receiver`);
  ws.onopen=()=>{
    logD('Connected to signaling server.');
    logD('Waiting for sender offer...');
    setSt('Connected — waiting for sender…','dy');
  };
  ws.onmessage=async({data})=>{
    const m=JSON.parse(data);
    if(m.type==='offer'){
      logD('Sender found! Received handshake offer.');
      setSt('Sender found — forming P2P…','dy');
      pc=new RTCPeerConnection(ICE);
      pc.onicecandidate=({candidate})=>{
        if(candidate&&ws.readyState===1) {
          logD('Gathered network route (ICE candidate)');
          ws.send(JSON.stringify({type:'ice',candidate}));
        }
      };
      pc.ondatachannel=({channel})=>{
        dc=channel; dc.binaryType='arraybuffer';
        logD('P2P signaling channel opened!');
        setSt('P2P connected!','dg');
        dc.onmessage=e=>{
          const d=e.data;
          if(typeof d==='string'){
            const msg=JSON.parse(d);
            if(msg.type==='meta'){
              meta=msg;
              logD(`Received metadata: "${msg.name}" (${fmtB(msg.size)})`);
              
              let batchInfo = '';
              if (msg.batchCount && msg.batchCount > 1) {
                batchInfo = ` · [File ${msg.batchIndex + 1} of ${msg.batchCount}]`;
              }
              
              $('rico').textContent=mIco(msg.mimeType);
              $('rname').textContent=msg.name;
              $('rmeta').textContent=fmtB(msg.size)+(msg.mimeType?' · '+msg.mimeType:'')+(msg.nickname?' · From '+msg.nickname:'') + batchInfo;
              $('finfo').style.display='block';
              
              if (msg.batchId && window.acceptedBatches[msg.batchId]) {
                logD('Auto-accepting file in batch...');
                window.doAccept();
              } else {
                setSt('File ready — click Accept','dg');
              }
            }
            if(msg.type==='done'&&meta){
              logD('P2P download complete. Saving file...');
              setProg(1,'Saving…');
              const blob=new Blob(chunks,{type:meta.mimeType||'application/octet-stream'});
              active1to1Receiver.lastBlob = blob;
              active1to1Receiver.lastMeta = meta;
              showRecvDonePersistent1to1(meta, code, dc, pc, ws);
            }
          } else {
            if(!lT) { lT=Date.now(); logD('Receiving file data stream...'); }
            chunks.push(d); rcvd+=d.byteLength;
            const now=Date.now(),dt=now-lT;
            if(dt>=400){spd=((rcvd-lR)/dt)*1000;lR=rcvd;lT=now;}
            const eta=spd>0&&meta?.size?Math.round((meta.size-rcvd)/spd):0;
            if(meta?.size)setProg(rcvd/meta.size,'Receiving…',spd,eta);
          }
        };
        dc.onclose=()=>{
          logD('Data channel closed.');
          setSt('Channel closed.','dr');
          stopTimer();
        };
      };
      logD('Applying sender handshake...');
      await pc.setRemoteDescription(m.sdp).catch(()=>{});
      const ans=await pc.createAnswer().catch(()=>null);
      if(!ans) { logD('Error creating handshake answer.'); return; }
      logD('Creating handshake answer...');
      await pc.setLocalDescription(ans).catch(()=>{});
      logD('Sending answer to signaling server...');
      ws.send(JSON.stringify({type:'answer',sdp:pc.localDescription}));
      logD('Applying network routes...');
      for(const c of pIce){try{await pc.addIceCandidate(c);}catch{}} pIce=[];
    } else if(m.type==='ice'){
      logD('Received peer network route (ICE)');
      if(pc?.remoteDescription){try{await pc.addIceCandidate(m.candidate);}catch{}}else pIce.push(m.candidate);
    } else if(m.type==='peer-left') {
      logD('Sender disconnected.');
      setSt('Sender disconnected.','dr');
      stopTimer();
    }
  };
  ws.onerror=()=>{
    logD('Error: Cannot connect to signaling server.');
    setSt('Cannot connect to signal server.','dr');
    stopTimer();
  };
  window.doAccept=()=>{
    if(!dc||dc.readyState!=='open')return;
    logD('Accepting download. Starting stream request...');
    $('abtn').style.display='none'; $('pw').style.display='block';
    if (meta && meta.batchId) {
      window.acceptedBatches[meta.batchId] = true;
    }
    dc.send(JSON.stringify({type:'accept'})); setSt('Receiving…','dg');
  };
}

      </div>

    </div>`;
  let info=null;

    let lL=0,lT=Date.now();
    xhr.onprogress=e=>{ if(e.lengthComputable){const now=Date.now(),dt=now-lT;let s=0,eta=0;if(dt>300){s=((e.loaded-lL)/dt)*1000;lL=e.loaded;lT=now;}if(s>0)eta=Math.round((e.total-e.loaded)/s);setProg(e.loaded/e.total,'Downloading…',s,eta);}};
    xhr.onload=()=>{ if(xhr.status===200){saveBlob(xhr.response,info.name);showRecvDone(info,'relay');}else setSt('Download failed.','dr'); };

function reconnectInbox(code) {
  logD('Manual reconnect initiated.');
  const statusEl = $('inbox-status');
  if (statusEl) {
    statusEl.className = 'bdg binf';
    statusEl.innerHTML = '<span class="dot db pu"></span> Connecting...';
  }
  setSt('Connecting to signaling server...', 'dy');
  
  const recBtn = $('inbox-reconnect-btn');
  if (recBtn) recBtn.style.display = 'none';

  if (inboxWs) {
    try {
      inboxWs.onclose = null;
      inboxWs.onerror = null;
      inboxWs.close();
    } catch(e) {}
    inboxWs = null;
  }
  
  for (const [senderId] of inboxPeers) {
    cleanupInboxPeer(senderId);
  }
  inboxPeers.clear();
  
  runInboxReceiver(code);
}

function runInboxReceiver(code) {
  startTimer();
  logD('Connecting to signaling server as Inbox...');
  const tokenQuery = window.inboxToken ? `&token=${window.inboxToken}` : '';
  inboxWs = new WebSocket(`${SIG}?code=${code}&role=inbox${tokenQuery}`);
  inboxWs._code = code;
  
  inboxWs.onopen = () => {
    logD('Inbox dashboard is live.');
    setSt('Dashboard live — waiting for senders…', 'dg');
    $('inbox-status').className = 'bdg bok';
    $('inbox-status').innerHTML = '<span class="dot dg pu"></span> Live Dashboard · 0 connected';
    const recBtn = $('inbox-reconnect-btn');
    if (recBtn) recBtn.style.display = 'none';
  };
  
  inboxWs.onmessage = async ({ data }) => {
    const m = JSON.parse(data);
    const senderId = m.senderId;
    
    if (m.type === 'peer-joined') {
      logD(`Sender joined: ${senderId}`);
      setupInboxPeer(code, senderId);
    }
    else if (m.type === 'offer') {
      logD(`Received offer from ${senderId}`);
      let peer = inboxPeers.get(senderId);
      if (!peer) {
        peer = setupInboxPeer(code, senderId);
      }
      const pc = peer.pc;
      await pc.setRemoteDescription(m.sdp).catch(()=>{});
      const ans = await pc.createAnswer().catch(()=>null);
      if (!ans) { logD(`Error creating answer for ${senderId}`); return; }
      await pc.setLocalDescription(ans).catch(()=>{});
      inboxWs.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription, targetSenderId: senderId }));
    }
    else if (m.type === 'ice') {
      const peer = inboxPeers.get(senderId);
      if (peer && peer.pc) {
        if (peer.pc.remoteDescription) {
          try { await peer.pc.addIceCandidate(m.candidate); } catch {}
        } else {
          peer.pIce.push(m.candidate);
        }
      }
    }
    else if (m.type === 'peer-left') {
      logD(`Sender left: ${senderId}`);
      cleanupInboxPeer(senderId);
    }
  };
  
  inboxWs.onclose = () => {
    logD('Inbox signaling connection closed.');
    if (inboxWs !== null) {
      setSt('Dashboard disconnected. Reconnecting...', 'dy');
      $('inbox-status').className = 'bdg bwn';
      $('inbox-status').innerHTML = '<span class="dot dy pu"></span> Reconnecting...';
      const recBtn = $('inbox-reconnect-btn');
      if (recBtn) recBtn.style.display = 'inline-flex';
      setTimeout(() => {
        if (inboxWs !== null && getActiveSessionType()?.type === 'inbox') {
          runInboxReceiver(code);
        }
      }, 3000);
    } else {
      setSt('Dashboard disconnected.', 'dr');
      $('inbox-status').className = 'bdg bwn';
      $('inbox-status').innerHTML = '<span class="dot dr"></span> Disconnected';
      const recBtn = $('inbox-reconnect-btn');
      if (recBtn) recBtn.style.display = 'inline-flex';
      stopTimer();
    }
  };
  
  inboxWs.onerror = () => {
    logD('Signaling server error.');
    setSt('Error connecting to signal server.', 'dr');
    const recBtn = $('inbox-reconnect-btn');
    if (recBtn) recBtn.style.display = 'inline-flex';
    stopTimer();
  };
}

function setupInboxPeer(code, senderId) {
  if (inboxPeers.has(senderId)) {
    cleanupInboxPeer(senderId);
  }
  
  const pc = new RTCPeerConnection(ICE);
  const peer = {
    pc,
    dc: null,
    pIce: [],
    activeFileId: null
  };
  
  inboxPeers.set(senderId, peer);
  updateInboxConnectedCount();
  
  pc.onicecandidate = ({ candidate }) => {
    if (candidate && inboxWs && inboxWs.readyState === 1) {
      inboxWs.send(JSON.stringify({ type: 'ice', candidate, targetSenderId: senderId }));
    }
  };
  
  pc.ondatachannel = ({ channel }) => {
    peer.dc = channel;
    peer.dc.binaryType = 'arraybuffer';
    logD(`P2P channel with ${senderId} opened.`);
    
    peer.pIce.forEach(async c => {
      try { await pc.addIceCandidate(c); } catch {}
    });
    peer.pIce = [];
    
    channel.onmessage = e => {
      const d = e.data;
      if (typeof d === 'string') {
        const msg = JSON.parse(d);
        if (msg.type === 'meta') {
          const fileId = 'f_' + genC();
          const fileEntry = {
            id: fileId,
            senderId: senderId,
            meta: msg,
            chunks: [],
            blob: null,
            accepted: false,
            elId: 'file-' + fileId,
            status: 'waiting',
            ratio: 0,
            speed: 0,
            eta: 0,
            lT: 0,
            lR: 0
          };
          receivedFiles.set(fileId, fileEntry);
          peer.activeFileId = fileId;
          
          const displayName = msg.nickname ? `${msg.nickname} (${senderId.slice(0, 8)})` : senderId.slice(0, 8);
          logD(`Incoming file from ${displayName}: "${msg.name}" (${fmtB(msg.size)})`);
          
          const ph = $('inbox-placeholder');
          if (ph) ph.remove();
          
          renderInboxFileEntry(fileId);
          
          if ($('auto-accept')?.checked || (msg.batchId && window.acceptedBatches[msg.batchId])) {
            acceptInboxFile(fileId);
          }
        }
        else if (msg.type === 'done') {
          const fileId = peer.activeFileId;
          const file = fileId ? receivedFiles.get(fileId) : null;
          if (file) {
            const displayName = file.meta.nickname ? `${file.meta.nickname} (${senderId.slice(0, 8)})` : senderId.slice(0, 8);
            logD(`P2P download from ${displayName} complete.`);
            const blob = new Blob(file.chunks, { type: file.meta.mimeType || 'application/octet-stream' });
            file.blob = blob;
            file.status = 'completed';
            file.ratio = 1;
            updateInboxFileProgress(fileId, 1, 'Completed', 0, 0);
            file.chunks = []; // Clear chunks memory
          }
          peer.activeFileId = null;
        }
      } else {
        const fileId = peer.activeFileId;
        const file = fileId ? receivedFiles.get(fileId) : null;
        if (file) {
          if (!file.lT) file.lT = Date.now();
          file.chunks.push(d);
          const rcvd = file.chunks.reduce((acc, chunk) => acc + chunk.byteLength, 0);
          const now = Date.now();
          const dt = now - file.lT;
          if (dt >= 400) {
            file.speed = ((rcvd - file.lR) / dt) * 1000;
            file.lR = rcvd;
            file.lT = now;
          }
          const eta = file.speed > 0 ? Math.round((file.meta.size - rcvd) / file.speed) : 0;
          file.ratio = rcvd / file.meta.size;
          updateInboxFileProgress(fileId, file.ratio, 'Downloading', file.speed, eta);
        }
      }
    };
    
    channel.onclose = () => {
      logD(`P2P channel with ${senderId} closed.`);
      const fileId = peer.activeFileId;
      if (fileId) {
        const file = receivedFiles.get(fileId);
        if (file && file.status !== 'completed') {
          file.status = 'disconnected';
          updateInboxFileProgress(fileId, null, 'Closed', 0, 0);
        }
      }
    };
  };
  
  return peer;
}

function updateInboxConnectedCount() {
  const activeCount = Array.from(inboxPeers.values()).filter(p => p.pc && p.pc.connectionState !== 'closed' && !p.disconnected).length;
  const el = $('inbox-status');
  if (el) {
    el.innerHTML = `<span class="dot dg pu"></span> Live Dashboard · ${activeCount} connected`;
  }
}

function acceptInboxFile(fileId) {
  const file = receivedFiles.get(fileId);
  if (!file) return;
  
  const peer = inboxPeers.get(file.senderId);
  if (!peer || !peer.dc || peer.dc.readyState !== 'open') return;
  
  file.accepted = true;
  file.status = 'downloading';
  $(`accept-row-${file.elId}`).style.display = 'none';
  $(`progress-row-${file.elId}`).style.display = 'block';
  
  const badge = $(`badge-${file.elId}`);
  if (badge) {
    badge.className = 'bdg binf';
    badge.textContent = 'Connecting';
  }
  
  if (file.meta && file.meta.batchId) {
    window.acceptedBatches[file.meta.batchId] = true;
  }
  
  peer.dc.send(JSON.stringify({ type: 'accept' }));
}

function rejectInboxFile(fileId) {
  const file = receivedFiles.get(fileId);
  if (!file) return;
  
  const entry = $(file.elId);
  if (entry) entry.remove();
  
  const peer = inboxPeers.get(file.senderId);
  if (peer) {
    if (peer.dc && peer.dc.readyState === 'open') {
      peer.dc.send(JSON.stringify({ type: 'reject' }));
      peer.dc.close();
    }
    cleanupInboxPeer(file.senderId);
  }
  receivedFiles.delete(fileId);
  updateInboxBulkActionsVisibility();
}

function updateInboxFileProgress(fileId, ratio, status, speed, eta) {
  const file = receivedFiles.get(fileId);
  if (!file) return;
  
  const badge = $(`badge-${file.elId}`);
  if (badge) {
    if (status === 'Downloading') {
      badge.className = 'bdg binf';
      badge.textContent = 'Downloading';
      $(`accept-row-${file.elId}`).style.display = 'none';
      $(`progress-row-${file.elId}`).style.display = 'block';
    } else if (status === 'Completed') {
      badge.className = 'bdg bok';
      badge.textContent = 'Completed';
      $(`progress-row-${file.elId}`).style.display = 'block';
      $(`label-${file.elId}`).textContent = 'Saved';
      $(`percent-${file.elId}`).textContent = '100%';
      $(`bar-${file.elId}`).style.width = '100%';
      $(`speed-${file.elId}`).textContent = '';
      $(`eta-${file.elId}`).textContent = '';
      
      $(`accept-row-${file.elId}`).style.display = 'none';
      $(`completed-row-${file.elId}`).style.display = 'flex';
      
      const isPreviewable = file.meta && file.meta.mimeType && (file.meta.mimeType.startsWith('image/') || file.meta.mimeType.startsWith('audio/') || file.meta.mimeType.startsWith('video/'));
      if (isPreviewable) {
        $(`preview-btn-${file.elId}`).style.display = 'block';
      }
      
      const cb = document.querySelector(`.inbox-file-cb[data-file-id="${fileId}"]`);
      if (cb) {
        cb.disabled = false;
      }
      updateSelectAllState();
      
      setTimeout(() => {
        const pr = $(`progress-row-${file.elId}`);
        if (pr) pr.style.display = 'none';
      }, 3000);
    } else if (status === 'Closed' || status === 'Disconnected') {
      badge.className = 'bdg bwn';
      badge.textContent = 'Disconnected';
      $(`accept-row-${file.elId}`).style.display = 'none';
      const cb = document.querySelector(`.inbox-file-cb[data-file-id="${fileId}"]`);
      if (cb) {
        cb.disabled = true;
        cb.checked = false;
      }
      updateSelectAllState();
    }
  }
  
  if (ratio !== null && status === 'Downloading') {
    const pct = Math.round(ratio * 100);
    const bar = $(`bar-${file.elId}`);
    const percent = $(`percent-${file.elId}`);
    const spdEl = $(`speed-${file.elId}`);
    const etaEl = $(`eta-${file.elId}`);
    
    if (bar) bar.style.width = ratio * 100 + '%';
    if (percent) percent.textContent = pct + '%';
    if (spdEl) spdEl.textContent = speed ? fmtS(speed) : '';
    if (etaEl) etaEl.textContent = eta ? fmtE(eta) : '';
  }
}

function cleanupInboxPeer(senderId) {
  const peer = inboxPeers.get(senderId);
  if (!peer) return;
  
  if (peer.pc) {
    peer.pc.close();
  }
  
  for (const [fileId, file] of receivedFiles) {
    if (file.senderId === senderId && file.status !== 'completed') {
      file.status = 'disconnected';
      const badge = $(`badge-${file.elId}`);
      if (badge) {
        badge.className = 'bdg bwn';
        badge.textContent = 'Disconnected';
      }
      const acceptRow = $(`accept-row-${file.elId}`);
      if (acceptRow) acceptRow.style.display = 'none';
      const progressRow = $(`progress-row-${file.elId}`);
      if (progressRow) progressRow.style.display = 'none';
      const cb = document.querySelector(`.inbox-file-cb[data-file-id="${fileId}"]`);
      if (cb) {
        cb.disabled = true;
        cb.checked = false;
      }
    }
  }
  
  inboxPeers.delete(senderId);
  updateInboxConnectedCount();
  updateSelectAllState();
}

function closeInbox() {
  releaseWakeLock();
  if (inboxWs) {
    const ws = inboxWs;
    inboxWs = null;
    ws.close();
  }
  for (const [senderId] of inboxPeers) {
    cleanupInboxPeer(senderId);
  }
  inboxPeers.clear();
  receivedFiles.clear();
  showHome();
}

let wakeLock = null;
async function handleAlwaysAwakeChange(cb) {
  if (cb.checked) {
    await acquireWakeLock();
  } else {
    releaseWakeLock();
  }
}

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) {
    logD('Screen Wake Lock is not supported in this browser.');
    return;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    logD('Screen Wake Lock active. PC will stay awake.');
    wakeLock.addEventListener('release', () => {
      logD('Screen Wake Lock released.');
    });
  } catch (err) {
    logD(`Wake Lock error: ${err.message}`);
  }
}

function releaseWakeLock() {
  if (wakeLock !== null) {
    wakeLock.release();
    wakeLock = null;
    logD('Screen Wake Lock disabled.');
  }
}

document.addEventListener('visibilitychange', async () => {
  const cb = $('always-awake');
  if (cb && cb.checked && document.visibilityState === 'visible') {
    await acquireWakeLock();
  }
});

function connectInboxSender(file, code, senderId) {
  let ws, pc, dc;
  startTimer();
  logD('Connecting to signaling server...');
  ws = new WebSocket(`${SIG}?code=${code}&role=sender&senderId=${senderId}&isInbox=true`);
  activeInboxSender.ws = ws;
  
  ws.onopen = () => {
    logD('Connected to signaling server.');
    logD('Waiting for inbox receiver to respond...');
    setSt('Waiting for inbox receiver...', 'dy');
    
    pc = new RTCPeerConnection(ICE);
    activeInboxSender.pc = pc;
    
    dc = pc.createDataChannel('file', { ordered: true });
    dc.binaryType = 'arraybuffer';
    activeInboxSender.dc = dc;
    
    let timer = setTimeout(() => {
      if (!activeInboxSender.connected) {
        setSt('P2P connection timed out.', 'dr');
        logD('Error: Connection timed out.');
        stopTimer();
      }
    }, P2P_TO);
    
    pc.onicecandidate = ({ candidate }) => {
      if (candidate && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'ice', candidate, targetSenderId: senderId }));
      }
    };
    
    pc.onconnectionstatechange = () => {
      logD('Connection state: ' + pc.connectionState);
      if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
        activeInboxSender.connected = false;
        setSt('Connection lost.', 'dr');
        stopTimer();
      }
    };
    
    dc.onopen = () => {
      clearTimeout(timer);
      activeInboxSender.connected = true;
      logD('P2P channel opened! Sending metadata...');
      setSt('Connected! Sending metadata...', 'dg');
      const item = window.sendQueue[0];
      sendInboxFileDirectly(item.file, item.batchId, item.index, item.count);
    };
    
    dc.onclose = () => {
      logD('Data channel closed.');
      activeInboxSender.connected = false;
      setSt('Channel closed.', 'dr');
      stopTimer();
    };
    
    logD('Creating connection offer...');
    pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
      ws.send(JSON.stringify({ type: 'offer', sdp: pc.localDescription, senderId }));
    }).catch(err => {
      setSt('Offer Error: ' + err.message, 'dr');
      logD('Offer Error: ' + err.message);
      stopTimer();
    });
  };
  
  let pIce = [];
  ws.onmessage = async ({ data }) => {
    const m = JSON.parse(data);
    if (m.type === 'answer') {
      logD('Inbox receiver answered handshake.');
      setSt('Inbox receiver found — forming P2P…', 'dy');
      await pc.setRemoteDescription(m.sdp).catch(() => {});
      for (const c of pIce) { try { await pc.addIceCandidate(c); } catch {} }
      pIce = [];
    } else if (m.type === 'ice') {
      if (pc?.remoteDescription) {
        try { await pc.addIceCandidate(m.candidate); } catch {}
      } else {
        pIce.push(m.candidate);
      }
    } else if (m.type === 'peer-left') {
      logD('Inbox receiver disconnected.');
      setSt('Inbox receiver disconnected.', 'dr');
      stopTimer();
    }
  };
  
  ws.onerror = () => {
    logD('Error connecting to signal server.');
    setSt('Cannot connect to signaling server.', 'dr');
    stopTimer();
  };
}

function sendInboxFileDirectly(file, batchId, index, count) {
  const dc = activeInboxSender.dc;
  if (!dc || dc.readyState !== 'open') return;
  
  const bId = batchId || null;
  const idx = index !== undefined ? index : 0;
  const cnt = count !== undefined ? count : 1;
  
  dc.send(JSON.stringify({
    type: 'meta',
    name: file.name,
    size: file.size,
    mimeType: file.type || 'application/octet-stream',
    nickname: safeStorage.get('fs_nickname') || null,
    batchId: bId,
    batchIndex: idx,
    batchCount: cnt,
    printSettings: window.printSettings || null
  }));
  
  dc.onmessage = e => {
    if (typeof e.data !== 'string') return;
    const m = JSON.parse(e.data);
    if (m.type === 'accept') {
      logD(`Inbox receiver accepted file ${idx + 1} of ${cnt}. Starting stream...`);
      setSt(`Transferring file ${idx + 1} of ${cnt} via P2P…`, 'dg');
      $('pw').style.display = 'block';
      sendChunks(dc, file, () => {
        stopTimer();
        if (window.sendQueue && window.sendQueueIndex + 1 < window.sendQueue.length) {
          window.sendQueueIndex++;
          const nextItem = window.sendQueue[window.sendQueueIndex];
          showInboxSenderProgressUI(nextItem.file, activeInboxSender.code, nextItem.index, nextItem.count);
          sendInboxFileDirectly(nextItem.file, nextItem.batchId, nextItem.index, nextItem.count);
        } else {
          showInboxSendDone(file, activeInboxSender.code);
        }
      });
    } else if (m.type === 'reject') {
      logD('Inbox receiver rejected file.');
      setSt('File rejected by receiver.', 'dr');
      stopTimer();
    }
  };
}

function setup1to1ReceiverDC(dc, lastMeta) {
  let meta = null;
  let rcvd = 0;
  let spd = 0, lR = 0, lT = 0;
  
  dc.onmessage = e => {
    const d = e.data;
    if (typeof d === 'string') {
      const msg = JSON.parse(d);
      if (msg.type === 'meta') {
        meta = msg;
        active1to1Receiver.meta = msg;
        active1to1Receiver.chunks = [];
        rcvd = 0; spd = 0; lR = 0; lT = 0;
        
        logD(`Received new metadata: "${msg.name}" (${fmtB(msg.size)})`);
        
        const waitingMsg = $('recv-waiting-msg');
        if (waitingMsg) waitingMsg.style.display = 'none';
        
        let batchInfo = '';
        if (msg.batchCount && msg.batchCount > 1) {
          batchInfo = ` · [File ${msg.batchIndex + 1} of ${msg.batchCount}]`;
        }
        
        $('rico').textContent = mIco(msg.mimeType);
        $('rname').textContent = msg.name;
        $('rmeta').textContent = fmtB(msg.size) + (msg.mimeType ? ' · ' + msg.mimeType : '') + (msg.nickname ? ' · From ' + msg.nickname : '') + batchInfo;
        $('finfo').style.display = 'block';
        $('abtn').style.display = 'block';
        $('pw').style.display = 'none';
        
        if (msg.batchId && window.acceptedBatches[msg.batchId]) {
          logD('Auto-accepting file in batch...');
          doAccept1to1Persistent();
        } else {
          setSt('New file ready — click Accept', 'dg');
        }
      }
      else if (msg.type === 'done' && meta) {
        logD('P2P download complete. Saving file...');
        setProg(1, 'Saving…');
        const blob = new Blob(active1to1Receiver.chunks, { type: meta.mimeType || 'application/octet-stream' });
        active1to1Receiver.lastBlob = blob;
        active1to1Receiver.lastMeta = meta;
        showRecvDonePersistent1to1(meta, active1to1Receiver.code, active1to1Receiver.dc, active1to1Receiver.pc, active1to1Receiver.ws);
      }
    } else {
      if (!lT) { lT = Date.now(); logD('Receiving file data stream...'); }
      active1to1Receiver.chunks.push(d);
      rcvd += d.byteLength;
      const now = Date.now();
      const dt = now - lT;
      if (dt >= 400) {
        spd = ((rcvd - lR) / dt) * 1000;
        lR = rcvd;
        lT = now;
      }
      const eta = spd > 0 && meta?.size ? Math.round((meta.size - rcvd) / spd) : 0;
      if (meta?.size) setProg(rcvd / meta.size, 'Receiving…', spd, eta);
    }
  };
  
  dc.onclose = () => {
    logD('Data channel closed.');
    setSt('Sender disconnected.', 'dr');
    stopTimer();
  };
}

function doAccept1to1Persistent() {
  const dc = active1to1Receiver.dc;
  if (!dc || dc.readyState !== 'open') return;
  
  logD('Accepting download. Starting stream request...');
  $('abtn').style.display = 'none';
  $('pw').style.display = 'block';
  
  const meta = active1to1Receiver.meta;
  if (meta && meta.batchId) {
    window.acceptedBatches[meta.batchId] = true;
  }
  
  dc.send(JSON.stringify({ type: 'accept' }));
  setSt('Receiving…', 'dg');
}

function onAddMoreFiles(e) {

    showPrepareTransfer(window.preparedFiles, window.prepType, window.prepCode);
  }
}

function removePreparedFile(idx) {
  window.preparedFiles.splice(idx, 1);
  if (window.preparedFiles.length === 0) {
    if (window.prepType === '1to1') showSend();
    else if (window.prepType === 'inbox') startInboxSender(window.prepCode);
    else if (window.prepType === '1to1persistent') resumeActiveSession();
    else showHome(true);
  } else {
    showPrepareTransfer(window.preparedFiles, window.prepType, window.prepCode);
  }

async function startBulkTransfer() {
  const nickname = ($('prep-nickname')?.value || '').trim().toUpperCase();
  safeStorage.set('fs_nickname', nickname);
  
  const files = window.preparedFiles;
  const type = window.prepType;
  const code = window.prepCode;
  
  if (!files || files.length === 0) return;

  // If the target has a room code, check premium/trial status first
  if (code && code.length === 6) {
    const btn = document.querySelector('.btn.ba');
    const originalText = btn ? btn.innerHTML : '';
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '🛡️ Running Security Scan...';
    }
    
    let isPremiumOrTrial = false;
    try {
      const statusRes = await fetch(`${API_BASE}/api/auth/room-status/${code}`);
      const statusData = await statusRes.json();
      isPremiumOrTrial = !!statusData.isPremiumOrTrial;
    } catch (err) {
      console.warn("Failed to check room status, bypassing scan", err);
    }
    
    if (isPremiumOrTrial) {
      for (const f of files) {
        // 1. Double extension check
        const extCheck = checkFilenameSafety(f.name);
        if (!extCheck.safe) {
          if (btn) {
            btn.disabled = false;
            btn.innerHTML = originalText;
          }
          alert(`⚠️ Security Block: ${f.name} is blocked. Reason: ${extCheck.reason}`);
          return;
        }
        
        // 2. Magic byte content check
        const contentCheck = await verifyFileContent(f);
        if (!contentCheck.safe) {
          if (btn) {
            btn.disabled = false;
            btn.innerHTML = originalText;
          }
          alert(contentCheck.reason);
          return;
        }
      }
    }
    
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  }

  if (type === 'inbox') {
    const copies = $('print-copies')?.value || '1';
    const color = $('print-color')?.value || 'bw';
    const sides = $('print-sides')?.value || 'single';
    window.printSettings = { copies, color, sides };
  } else {
    window.printSettings = null;
  }
  
  const batchId = 'b_' + genC();
  window.sendQueue = files.map((f, idx) => ({
    file: f,
    index: idx,
    count: files.length,
    batchId
  }));
  window.sendQueueIndex = 0;
  
  if (type === '1to1') {
    startSend(window.sendQueue[0].file);
  } else if (type === 'inbox') {
    const item = window.sendQueue[0];
    startInboxSenderFlow(item.file, code);
  } else if (type === '1to1persistent') {
    send1to1PersistentBatch();
  }
}

async function zipSelectedFiles() {
  const checkedCbs = document.querySelectorAll('.inbox-file-cb:checked');
  const filesToZip = [];
  for (const cb of checkedCbs) {
    const fileId = cb.getAttribute('data-file-id');
    const file = receivedFiles.get(fileId);
    if (file && file.blob) {
      filesToZip.push({ name: file.meta.name, blob: file.blob });
    }
  }
  if (filesToZip.length === 0) return;

  const zipBtn = $('zip-selected-btn');
  const originalText = zipBtn.innerHTML;
  zipBtn.disabled = true;
  zipBtn.textContent = '🤐 Zipping...';

  try {
    const zipBlob = await generateZipBlob(filesToZip);
    const dateString = new Date().toISOString().slice(0, 10);
    saveBlob(zipBlob, `fileshare_inbox_${dateString}.zip`);
  } catch (err) {
    logD(`Error zipping files: ${err.message}`);
  } finally {
    zipBtn.disabled = false;
    zipBtn.innerHTML = originalText;
  }
}

async function generateZipBlob(files) {
  const crcTable = window.crcTable || (window.crcTable = (() => {
    const table = [];
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) {
        c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
      }
      table[n] = c;
    }
    return table;
  })());

  function getCrc32(arr) {
    let crc = 0 ^ (-1);
    for (let i = 0; i < arr.length; i++) {
      crc = (crc >>> 8) ^ crcTable[(crc ^ arr[i]) & 0xff];
    }
    return (crc ^ (-1)) >>> 0;
  }

  const parts = [];
  const cdParts = [];
  let currentOffset = 0;

  const d = new Date();
  const dosTime = ((d.getHours() & 0x1f) << 11) | ((d.getMinutes() & 0x3f) << 5) | ((d.getSeconds() >> 1) & 0x1f);
  const dosDate = (((d.getFullYear() - 1980) & 0x7f) << 9) | (((d.getMonth() + 1) & 0x0f) << 5) | (d.getDate() & 0x1f);

  for (const file of files) {
    const nameBytes = new TextEncoder().encode(file.name);
    const ab = await file.blob.arrayBuffer();
    const dataBytes = new Uint8Array(ab);
    const crc = getCrc32(dataBytes);
    const size = dataBytes.length;

    const lfh = new Uint8Array(30 + nameBytes.length);
    const view = new DataView(lfh.buffer);

    view.setUint32(0, 0x04034b50, true);
    view.setUint16(4, 10, true);
    view.setUint16(6, 0, true);
    view.setUint16(8, 0, true);
    view.setUint16(10, dosTime, true);
    view.setUint16(12, dosDate, true);
    view.setUint32(14, crc, true);
    view.setUint32(18, size, true);
    view.setUint32(22, size, true);
    view.setUint16(26, nameBytes.length, true);
    view.setUint16(28, 0, true);
    lfh.set(nameBytes, 30);

    parts.push(lfh);
    parts.push(dataBytes);

    const cdh = new Uint8Array(46 + nameBytes.length);
    const cdView = new DataView(cdh.buffer);

    cdView.setUint32(0, 0x02014b50, true);
    cdView.setUint16(4, 20, true);
    cdView.setUint16(6, 10, true);
    cdView.setUint16(8, 0, true);
    cdView.setUint16(10, 0, true);
    cdView.setUint16(12, dosTime, true);
    cdView.setUint16(14, dosDate, true);
    cdView.setUint32(16, crc, true);
    cdView.setUint32(20, size, true);
    cdView.setUint32(24, size, true);
    cdView.setUint16(28, nameBytes.length, true);
    cdView.setUint16(30, 0, true);
    cdView.setUint16(32, 0, true);
    cdView.setUint16(34, 0, true);
    cdView.setUint16(36, 0, true);
    cdView.setUint32(38, 0, true);
    cdView.setUint32(42, currentOffset, true);
    cdh.set(nameBytes, 46);

    cdParts.push(cdh);

    currentOffset += lfh.length + size;
  }

  const cdOffset = currentOffset;
  let cdSize = 0;
  for (const part of cdParts) {
    cdSize += part.length;
  }

  const eocd = new Uint8Array(22);
  const eocdView = new DataView(eocd.buffer);

  eocdView.setUint32(0, 0x06054b50, true);
  eocdView.setUint16(4, 0, true);
  eocdView.setUint16(6, 0, true);
  eocdView.setUint16(8, files.length, true);
  eocdView.setUint16(10, files.length, true);
  eocdView.setUint32(12, cdSize, true);
  eocdView.setUint32(16, cdOffset, true);
  eocdView.setUint16(20, 0, true);

  const allParts = [...parts, ...cdParts, eocd];
  return new Blob(allParts, { type: 'application/zip' });
}

  if (mime.startsWith('image/')) {

    content = `<audio controls autoplay src="${url}" style="width:100%; margin-top:1rem;"></audio>`;
  } else if (mime.startsWith('video/')) {
    content = `<video controls autoplay src="${url}" style="max-width:100%; max-height:70vh; border-radius:8px; display:block; margin:0 auto;"></video>`;
  } else {
    content = `<div style="text-align:center; padding:2rem; color:var(--m);">Preview not supported for this file type.</div>`;

  const modal = document.createElement('div');
  modal.id = 'preview-modal';

      <div style="background:rgba(0,0,0,0.3); border-radius:var(--r); padding:1rem; display:flex; align-items:center; justify-content:center; min-height:150px;">

async function handleAuthSubmit(e, isRegister) {
  e.preventDefault();
  const errorEl = $('auth-error-msg');
  const submitBtn = $('auth-submit-btn');
  if (errorEl) errorEl.style.display = 'none';

  const email = $('auth-email').value.trim();
  const password = $('auth-password').value;
  const payload = { email, password };

  if (isRegister) {
    const confirmPassword = $('auth-confirm-password').value;
    if (password !== confirmPassword) {
      showAuthError('Passwords do not match.');
      return;
    }
    if (password.length < 8) {
      showAuthError('Password must be at least 8 characters long.');
      return;
    }
    if (!/[A-Z]/.test(password)) {
      showAuthError('Password must contain at least one uppercase letter.');
      return;
    }
    if (!/[^A-Za-z0-9]/.test(password)) {
      showAuthError('Password must contain at least one symbol.');
      return;
    }
  }

  submitBtn.disabled = true;
  const originalText = submitBtn.innerHTML;
  submitBtn.textContent = 'Processing...';

  try {
    const endpoint = isRegister ? `${API_BASE}/api/auth/signup` : `${API_BASE}/api/auth/login`;
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (!res.ok) {
      showAuthError(data.error || 'Authentication failed.');
      return;
    }

    if (isRegister) {
      const loginRes = await fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const loginData = await loginRes.json();
      if (!loginRes.ok) {
        showAuthError('Signup succeeded, but automatic login failed. Please log in manually.');
        return;
      }
      localStorage.setItem('fs_auth_token', loginData.token);
      localStorage.setItem('fs_auth_code', loginData.code);
      updateHeaderAuth();
      showInboxDashboard(loginData.code, loginData.token);
    } else {
      localStorage.setItem('fs_auth_token', data.token);
      localStorage.setItem('fs_auth_code', data.code);
      updateHeaderAuth();
      showInboxDashboard(data.code, data.token);
    }
  } catch (err) {
    console.error(err);
    showAuthError('Failed to connect to the server. Please check your connection.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalText;
  }
}

function showAuthError(msg) {
  const errorEl = $('auth-error-msg');
  if (errorEl) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
  }
}

function printInboxFile(fileId) {
  const file = receivedFiles.get(fileId);
  if (!file || !file.blob) return;

  const mime = file.meta.mimeType || '';
  const url = URL.createObjectURL(file.blob);

  if (mime.startsWith('image/') || mime.startsWith('text/') || mime === 'application/pdf') {
    const iframe = document.createElement('iframe');
    iframe.style.position = 'fixed';
    iframe.style.right = '0';
    iframe.style.bottom = '0';
    iframe.style.width = '0';
    iframe.style.height = '0';
    iframe.style.border = '0';
    document.body.appendChild(iframe);

    iframe.onload = () => {
      setTimeout(() => {
        try {
          iframe.contentWindow.focus();
          iframe.contentWindow.print();
        } catch (e) {
          window.open(url, '_blank').print();
        }
        setTimeout(() => {
          document.body.removeChild(iframe);
          URL.revokeObjectURL(url);
        }, 1000);
      }, 500);
    };

    if (mime === 'application/pdf' || mime.startsWith('text/')) {
      iframe.src = url;
    } else {
      iframe.srcdoc = `
        <html>
          <body style="margin:0; display:flex; align-items:center; justify-content:center;">
            <img src="${url}" style="max-width:100%; max-height:100%; object-fit:contain;" />
          </body>
        </html>
      `;
    }
  } else {
    const win = window.open(url, '_blank');
    if (win) {
      win.onload = () => {
        win.print();
      };
    }
  }
}

function checkFilenameSafety(filename) {
  const parts = filename.toLowerCase().split('.');
  if (parts.length >= 3) {
    const dangerousExtensions = ['exe', 'scr', 'bat', 'cmd', 'vbs', 'js', 'sh', 'msi', 'ps1', 'com', 'pif'];
    const lastExtension = parts[parts.length - 1];
    if (dangerousExtensions.includes(lastExtension)) {
      return { safe: false, reason: `Double extension masquerading as document.` };
    }
  }
  return { safe: true };
}

function verifyFileContent(file) {
  return new Promise((resolve) => {
    if (file.size === 0) {
      resolve({ safe: true });
      return;
    }
    const reader = new FileReader();
    const blob = file.slice(0, 4);
    reader.readAsArrayBuffer(blob);
    reader.onloadend = function(e) {
      if (e.target.readyState === FileReader.DONE) {
        const bytes = new Uint8Array(e.target.result);
        let header = "";
        for (let i = 0; i < bytes.length; i++) {
          header += bytes[i].toString(16).padStart(2, '0');
        }
        
        const fileExt = file.name.split('.').pop().toLowerCase();
        
        // 4d5a is the Hex signature for Windows Executables ("MZ")
        if (header.startsWith("4d5a")) {
          const exeTypes = ['exe', 'dll', 'sys', 'scr'];
          if (!exeTypes.includes(fileExt)) {
            resolve({ safe: false, reason: `⚠️ Security Block: ${file.name} is actually a Windows Executable program (4d5a). Transfer blocked for your safety.` });
            return;
          }
        }
        
        // 25504446 is hex for "%PDF"
        if (header.startsWith("25504446")) {
          if (fileExt !== 'pdf') {
            resolve({ safe: false, reason: `Mismatched PDF file signature.` });
            return;
          }
        }
        
        // 89504e47 is hex for PNG image
        if (header.startsWith("89504e47")) {
          if (fileExt !== 'png') {
            resolve({ safe: false, reason: `Mismatched PNG image signature.` });
            return;
          }
        }
        
        resolve({ safe: true });
      } else {
        resolve({ safe: true });
      }
    };
  });
}
